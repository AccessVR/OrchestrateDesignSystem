<!-- @dsCard group="Brand" viewport="700x150" name="Radius" subtitle="5px default · 10px imagery · fully-round pills" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--oxr-surface);font-family:var(--oxr-font-sans);color:var(--oxr-text)}
  .row{display:flex;gap:28px;align-items:flex-end}
  .item{display:flex;flex-direction:column;gap:8px;align-items:center}
  .box{width:80px;height:64px;background:var(--oxr-brand-wash);border:1.5px solid var(--oxr-brand)}
  .tok{font-family:var(--oxr-font-mono);font-size:11px;color:var(--oxr-text-muted)}
</style></head>
<body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:var(--oxr-radius-sm)"></div><span class="tok">3px · sm</span></div>
  <div class="item"><div class="box" style="border-radius:var(--oxr-radius)"></div><span class="tok">5px · default</span></div>
  <div class="item"><div class="box" style="border-radius:var(--oxr-radius-image)"></div><span class="tok">10px · image</span></div>
  <div class="item"><div class="box" style="width:64px;border-radius:var(--oxr-radius-pill)"></div><span class="tok">9999px · pill</span></div>
</div>
</body></html>
