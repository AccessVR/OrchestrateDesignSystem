<!-- @dsCard group="Type" viewport="700x320" name="Headlines" subtitle="Mona Sans normal width, weight 800, 1.2 line-height, −1px tracking" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--oxr-surface);font-family:var(--oxr-font-sans);color:var(--oxr-text)}
  .item{margin-bottom:20px}
  .item:last-child{margin-bottom:0}
  .tok{display:block;font-family:var(--oxr-font-mono);font-size:11px;color:var(--oxr-text-muted);margin-bottom:4px}
  /* Live-site headline treatment: normal width, 800, line-height 1.2, slight negative tracking */
  .h{margin:0;font-weight:800;line-height:1.2;letter-spacing:-0.018em}
  .h1{font-size:var(--oxr-text-h1)}   /* hero / page title — 56px max */
  .h2{font-size:var(--oxr-text-h2)}   /* section head */
  .h3{font-size:var(--oxr-text-h3);font-weight:600}  /* subhead */
</style></head>
<body>
  <div class="item"><span class="tok">h1 · 800 · lh 1.2 · −1px · 56px max</span><div class="h h1">Simulation training for everyone</div></div>
  <div class="item"><span class="tok">h2 · 800</span><div class="h h2">Where learners practice before they perform</div></div>
  <div class="item"><span class="tok">h3 · 600 · subhead</span><div class="h h3">Everything you need to scale immersive learning</div></div>
</body></html>
