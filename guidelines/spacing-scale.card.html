<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--oxr-surface);font-family:var(--oxr-font-sans);color:var(--oxr-text)}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:8px}
  .bar{height:16px;background:var(--oxr-brand);border-radius:2px}
  .tok{font-family:var(--oxr-font-mono);font-size:11px;color:var(--oxr-text-muted);width:160px;flex-shrink:0}
</style></head>
<body>
  <div class="row"><span class="tok">--oxr-space-1 · 4</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="tok">--oxr-space-2 · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="tok">--oxr-space-3 · 12</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="tok">--oxr-space-4 · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="tok">--oxr-space-5 · 24</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="tok">--oxr-space-6 · 32</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="tok">--oxr-space-7 · 48</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="tok">--oxr-space-8 · 64</span><div class="bar" style="width:64px"></div></div>
</body></html>
