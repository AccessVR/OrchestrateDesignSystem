<!-- @dsCard group="Colors" viewport="700x160" name="Accent Gradients" subtitle="Hero / feature moments only — never body UI" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--oxr-surface);font-family:var(--oxr-font-sans);color:var(--oxr-text)}
  .row{display:flex;gap:14px}
  .sw{flex:1;border-radius:var(--oxr-radius);overflow:hidden}
  .chip{height:88px}
  .meta{padding:8px 2px;font-size:12px}
  .name{font-weight:600}
  .hex{color:var(--oxr-text-muted);font-family:var(--oxr-font-mono);font-size:11px}
</style></head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--oxr-grad-heat)"></div><div class="meta"><div class="name">Heat</div><div class="hex">#F32758 → #FFC581</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--oxr-grad-blue)"></div><div class="meta"><div class="name">Blue</div><div class="hex">#0057FF → #31B5FF</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--oxr-grad-pink)"></div><div class="meta"><div class="name">Pink</div><div class="hex">#FF007A → #FF81BD</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--oxr-grad-purple)"></div><div class="meta"><div class="name">Purple</div><div class="hex">#5B0B9E → #9A1EEE</div></div></div>
</div>
</body></html>
