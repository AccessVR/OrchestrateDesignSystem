<!-- @dsCard group="Colors" viewport="700x150" name="Ink & Neutrals" subtitle="Warm near-black ink + warm neutrals — never pure #000" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--oxr-surface);font-family:var(--oxr-font-sans);color:var(--oxr-text)}
  .row{display:flex;gap:14px}
  .sw{flex:1;border-radius:var(--oxr-radius);overflow:hidden;border:1px solid var(--oxr-border)}
  .chip{height:64px}
  .meta{padding:8px 10px;font-size:12px}
  .name{font-weight:600}
  .hex{color:var(--oxr-text-muted);font-family:var(--oxr-font-mono);font-size:11px}
</style></head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--oxr-ink-900)"></div><div class="meta"><div class="name">Ink</div><div class="hex">#231B15</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--oxr-brown-500)"></div><div class="meta"><div class="name">Muted</div><div class="hex">#6D4F3B</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--oxr-deep, #452F21)"></div><div class="meta"><div class="name">Deep brown</div><div class="hex">#452F21</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--oxr-stone-100)"></div><div class="meta"><div class="name">Stone tint</div><div class="hex">#F8F7F7</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--oxr-surface)"></div><div class="meta"><div class="name">Surface</div><div class="hex">#FFFFFF</div></div></div>
</div>
</body></html>
