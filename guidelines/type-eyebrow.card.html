<!-- @dsCard group="Type" viewport="700x150" name="Eyebrow & Mono" subtitle="Uppercase kicker + Mona Sans Mono" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--oxr-surface);font-family:var(--oxr-font-sans);color:var(--oxr-text)}
  .stack{display:flex;flex-direction:column;gap:16px}
  .eyebrow{font-size:0.78rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--oxr-brand)}
  .eyebrow.muted{color:var(--oxr-text-muted)}
  .mono{font-family:var(--oxr-font-mono);font-size:14px;background:var(--oxr-surface-tint);padding:10px 12px;border-radius:var(--oxr-radius);border:1px solid var(--oxr-border)}
</style></head>
<body>
<div class="stack">
  <div>
    <span class="eyebrow">Built for healthcare &amp; education</span>
    &nbsp;&nbsp;
    <span class="eyebrow muted">Coming soon</span>
  </div>
  <div class="mono">SCORM_export.zip · var(--oxr-font-mono)</div>
</div>
</body></html>
