<!-- @dsCard group="Colors" viewport="700x150" name="Brand / Accent" subtitle="One energetic orange — used sparingly" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--oxr-surface);font-family:var(--oxr-font-sans);color:var(--oxr-text)}
  .row{display:flex;gap:14px}
  .sw{flex:1;border-radius:var(--oxr-radius);overflow:hidden;border:1px solid var(--oxr-border)}
  .chip{height:64px}
  .meta{padding:8px 10px;font-size:12px}
  .name{font-weight:600}
  .hex{color:var(--oxr-text-muted);font-family:var(--oxr-font-mono);font-size:11px;letter-spacing:.02em}
</style></head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--oxr-brand)"></div><div class="meta"><div class="name">Brand</div><div class="hex">#FF6600 · --oxr-brand</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--oxr-brand-hover)"></div><div class="meta"><div class="name">Brand hover</div><div class="hex">#E65C00</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--oxr-brand-tint)"></div><div class="meta"><div class="name">Peach tint</div><div class="hex">#E9B796</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--oxr-brand-wash)"></div><div class="meta"><div class="name">Cream wash</div><div class="hex">#F2ECE9</div></div></div>
</div>
</body></html>
