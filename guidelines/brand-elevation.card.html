<!-- @dsCard group="Brand" viewport="700x190" name="Elevation" subtitle="Soft layered card & popover + signature crisp offset" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:30px 24px;background:var(--oxr-surface-tint);font-family:var(--oxr-font-sans);color:var(--oxr-text)}
  .row{display:flex;gap:34px;align-items:center}
  .item{display:flex;flex-direction:column;gap:12px;align-items:center}
  .box{width:130px;height:78px;background:var(--oxr-surface);border-radius:var(--oxr-radius);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--oxr-text-muted)}
  .crisp{border:1px solid var(--oxr-ink-900)}
  .tok{font-family:var(--oxr-font-mono);font-size:11px;color:var(--oxr-text-muted)}
</style></head>
<body>
<div class="row">
  <div class="item"><div class="box" style="box-shadow:var(--oxr-shadow-card)">card</div><span class="tok">--oxr-shadow-card</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--oxr-shadow-popover)">popover</div><span class="tok">--oxr-shadow-popover</span></div>
  <div class="item"><div class="box crisp" style="box-shadow:var(--oxr-shadow-crisp)">featured</div><span class="tok">--oxr-shadow-crisp · rare</span></div>
</div>
</body></html>
